<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
<title>我的简历 · 得人招聘</title>
<link rel="stylesheet" href="/css/site.css" />
<style>
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 18px; }
  .field label { display: block; font-size: 12.5px; color: #6b7280; margin-bottom: 5px; }
  .field input, .field select, .field textarea {
    width: 100%; padding: 9px 11px; border: 1px solid var(--border-strong); border-radius: 6px; font-family: inherit; font-size: 14px; outline: none; background: #fff;
  }
  .field input:focus, .field textarea:focus { border-color: var(--brand); }
  .field.full { grid-column: 1 / -1; }
  .field textarea { min-height: 84px; resize: vertical; }
</style>
</head>
<body data-page="resume">
<header class="nav"><div class="nav-inner">
  <a class="brand" href="/"><span class="logo">得</span>得人招聘</a>
  <nav class="nav-links"><a href="/">首页</a><a href="/search.html?q=">找工作</a><a href="/companies.html">看公司</a><a href="/community.html">职言职语</a><a href="/announce.html">平台公告</a></nav>
  <div class="nav-spacer"></div>
  <div id="nav-user"></div>
</div></header>

<main class="wrap" style="padding-top:22px;max-width:820px">
  <div class="section-head"><h2>我的简历</h2><a class="more" href="/center.html">← 返回中心</a></div>
  <form id="resume-form" class="panel-sec">
    <div class="form-grid">
      <div class="field"><label>姓名</label><input name="name" type="text" /></div>
      <div class="field"><label>性别</label><select name="gender"><option>男</option><option>女</option><option>不愿透露</option></select></div>
      <div class="field"><label>出生年月</label><input name="birth" type="text" placeholder="如 1998-06" /></div>
      <div class="field"><label>最高学历</label><select name="edu"><option>大专</option><option>本科</option><option>硕士</option><option>博士</option></select></div>
      <div class="field"><label>毕业院校</label><input name="school" type="text" /></div>
      <div class="field"><label>专业</label><input name="major" type="text" /></div>
      <div class="field"><label>工作年限</label><input name="years" type="text" placeholder="如 3" /></div>
      <div class="field"><label>期望薪资</label><input name="salary" type="text" placeholder="如 25-35K" /></div>
      <div class="field"><label>期望城市</label><input name="city" type="text" placeholder="如 沄洲" /></div>
      <div class="field"><label>手机号</label><input name="phone" type="text" /></div>
      <div class="field full"><label>个人优势 / 自我评价</label><textarea name="summary"></textarea></div>
    </div>
    <div style="margin-top:18px;display:flex;gap:10px;align-items:center">
      <button type="submit" class="btn btn-primary">保存简历</button>
      <span id="resume-saved" style="color:#16a34a;font-size:13px;display:none">已保存</span>
    </div>
  </form>
</main>

<footer class="footer"><div class="footer-inner">
  <span>© 2024 得人招聘 deren.cxn</span><span class="sep">·</span><span>沄ICP备2024xxxxx号-3</span>
</div></footer>
<div class="toast" id="toast"></div>
<script src="/js/app.js"></script>
</body>
</html>
